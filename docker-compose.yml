version: "3.9"

services:
  app:
    build: .
    container_name: isata-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: isata
      DB_USERNAME: isata
      DB_PASSWORD: isata
    depends_on:
      - db
    networks:
      - isata-net

  web:
    image: nginx:stable-alpine
    container_name: isata-web
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - isata-net

  db:
    image: mysql:8.0
    container_name: isata-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: isata
      MYSQL_USER: isata
      MYSQL_PASSWORD: isata
    ports:
      - "3307:3306"
    command: --default-authentication-plugin=mysql_native_password
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - isata-net

networks:
  isata-net:

volumes:
  db-data:

